<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Identity Card</title>
    <!-- Using Inter for a clean, professional student ID look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5; /* Indigo */
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --shadow-base: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition-smooth: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .student-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 380px;
            border-radius: 30px;
            box-shadow: var(--shadow-base);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            border: 2px solid rgba(79, 70, 229, 0.3); /* Visible Outline */
        }

        /* Card background pattern */
        .student-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: var(--primary-color);
            opacity: 0.05;
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            z-index: 0;
        }

        /* Card hover - only shadow and border change */
        .student-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: var(--primary-color);
        }

        /* Profile Image Independent Hover */
        .profile-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
            z-index: 1;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .profile-image-holder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #f3f4f6;
            border: 4px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: linear-gradient(to bottom right, #f9fafb, #e5e7eb);
        }

        .profile-image-holder svg {
            width: 65px;
            height: 65px;
            fill: var(--primary-light);
        }

        .profile-container:hover {
            transform: translateY(-15px) scale(1.1);
            filter: drop-shadow(0 10px 15px rgba(79, 70, 229, 0.3));
        }

        /* Student Name Independent Hover */
        .student-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
            transition: var(--transition-smooth);
            cursor: pointer;
            display: inline-block;
        }

        .student-name:hover {
            transform: translateY(-8px);
            color: var(--primary-color);
            text-shadow: 0 5px 10px rgba(79, 70, 229, 0.2);
        }

        .student-stream {
            display: block; /* Changed to block for better alignment */
            width: fit-content;
            margin: 0 auto 25px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--primary-color);
            background-color: rgba(79, 70, 229, 0.1);
            padding: 4px 16px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Bio Section Independent Hover */
        .bio-wrapper {
            background-color: #f9fafb;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            transition: var(--transition-smooth);
            border: 1px solid #f3f4f6;
            cursor: pointer;
        }

        .bio-wrapper:hover {
            transform: translateY(-10px);
            background-color: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border-color: var(--primary-light);
        }

        /* Card Footer */
        .card-footer {
            border-top: 1px solid #f3f4f6;
            padding-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .id-number {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .status-badge {
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #10b981; /* Green */
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="student-card">
        <div class="profile-container">
            <div class="profile-image-holder">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
        </div>

        <div class="student-info">
            <h1 class="student-name">Alex Rivera</h1>
            <span class="student-stream">Computer Science</span>
        </div>

        <div class="bio-wrapper">
            <span class="bio-title">About Me</span>
            <p class="bio-text">
                Passionate software engineer in training with a love for UI/UX design and cloud architecture. Always learning, always building.
            </p>
        </div>

        <div class="card-footer">
            <div class="id-number">ID: STU-2026-0842</div>
            <div class="status-badge">
                <span class="status-dot"></span>
                ACTIVE
            </div>
        </div>
    </div>

</body>
</html>
